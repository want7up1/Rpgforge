services:
  web:
    build:
      context: ./web
    ports:
      - "3000:3000"
    environment:
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://api:8000}
    depends_on:
      api:
        condition: service_healthy

  api:
    build:
      context: ./api
    expose:
      - "8000"
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://rpg:rpg@postgres:5432/rpgforge}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-}
      DEEPSEEK_FLASH_MODEL: ${DEEPSEEK_FLASH_MODEL:-deepseek-v4-flash}
      DEEPSEEK_PRO_MODEL: ${DEEPSEEK_PRO_MODEL:-deepseek-v4-pro}
      SETTINGS_ADMIN_TOKEN: ${SETTINGS_ADMIN_TOKEN:-}
      MIMO_API_KEY: ${MIMO_API_KEY:-}
      AUDIO_STORAGE_PATH: ${AUDIO_STORAGE_PATH:-/data/audio}
      PORTRAIT_STORAGE_PATH: ${PORTRAIT_STORAGE_PATH:-/data/portraits}
    volumes:
      - audio_data:/data/audio
      - portrait_data:/data/portraits
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    build:
      context: ./api
    command: python -m app.worker
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://rpg:rpg@postgres:5432/rpgforge}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-}
      DEEPSEEK_FLASH_MODEL: ${DEEPSEEK_FLASH_MODEL:-deepseek-v4-flash}
      DEEPSEEK_PRO_MODEL: ${DEEPSEEK_PRO_MODEL:-deepseek-v4-pro}
      SETTINGS_ADMIN_TOKEN: ${SETTINGS_ADMIN_TOKEN:-}
      MIMO_API_KEY: ${MIMO_API_KEY:-}
      AUDIO_STORAGE_PATH: ${AUDIO_STORAGE_PATH:-/data/audio}
      PORTRAIT_STORAGE_PATH: ${PORTRAIT_STORAGE_PATH:-/data/portraits}
    volumes:
      - audio_data:/data/audio
      - portrait_data:/data/portraits
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rpg
      POSTGRES_PASSWORD: rpg
      POSTGRES_DB: rpgforge
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rpg -d rpgforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  audio_data:
  portrait_data:
